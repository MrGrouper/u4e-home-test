<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U4Education</title>
  <style>
    body, html {
      margin: 0;
      padding: 50;
      height: 100%;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .hero video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: -1;
    }
    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      background: white;
      color: black;
      padding: 0.85rem 1.2rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }
    .btn.secondary {
      background: transparent;
      border: 2px solid white;
      color: white;
    }
  </style>
</head>
<body>
  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="U4EOpen.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
    <div class="overlay"></div>
    <div class="content">
      <h1>U4Education</h1>
      <h2>AI Assisted Learning</h2> 
      <div class="buttons">
        <a href="https://u4education.com/catalog" class="btn">View Classes</a>
        <a href="https://u4education.com/signup?apply=true" class="btn secondary">Apply for a Scholarship</a>
      </div>
    </div>
  </section>
</body>
</html>
